<!doctype html>
<html lang="zh-CN" class="login-page-root">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="云南茶韵｜登录（可跳过）" />
    <title>云南茶韵｜登录</title>
    <link rel="stylesheet" href="css/styles.css" />
    <script>
      (() => {
        const t = localStorage.getItem("yntea_theme");
        if (t === "dark") document.documentElement.classList.add("theme-dark");
      })();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.7.9/dist/axios.min.js" defer></script>
    <script defer src="js/login.js"></script>
  </head>
  <body class="login-page-body">
    <a class="skip-link" href="#login-modal">跳到登录表单</a>

    <!-- 模糊背景层：模拟网站衬底 -->
    <div class="login-backdrop" aria-hidden="true">
      <div class="login-backdrop__wash"></div>
      <div class="login-backdrop__blur"></div>
    </div>

    <div class="login-scrim">
      <main class="login-modal" id="login-modal">
        <header class="login-modal__head">
          <div class="login-modal__titles">
            <h1 class="login-modal__title">登录 (可跳过)</h1>
            <p class="login-modal__sub">不登录也可以正常浏览网站。</p>
          </div>
          <a class="login-btn-ghost login-btn-ghost--sm" href="index.html">暂不登录</a>
        </header>

        <p id="loginAlert" class="login-modal-alert" role="status" aria-live="polite" hidden></p>

        <form id="loginForm" class="login-modal-form" autocomplete="on">
          <div class="login-field">
            <label for="username">用户名</label>
            <input id="username" name="username" type="text" autocomplete="username" required />
          </div>

          <div class="login-field">
            <label for="phone">手机号</label>
            <input
              id="phone"
              name="phone"
              type="tel"
              inputmode="numeric"
              maxlength="11"
              placeholder="11位手机号"
              required
            />
          </div>

          <div class="login-field login-field--row">
            <div class="login-field__grow">
              <label for="code">验证码</label>
              <input
                id="code"
                name="code"
                type="text"
                inputmode="numeric"
                maxlength="6"
                placeholder="6位验证码"
                required
              />
            </div>
            <button class="login-btn-ghost login-btn-ghost--code" type="button" id="btnSendCode">获取验证码</button>
          </div>

          <div class="login-field">
            <label for="password">密码</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required />
          </div>

          <input type="hidden" id="uuid" name="uuid" value="" />

          <button class="login-btn-primary" type="submit">登录</button>
        </form>
      </main>
    </div>
  </body>
</html>
